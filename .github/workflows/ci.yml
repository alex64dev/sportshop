name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # PHP — Lint & Analyse statique
  # ──────────────────────────────────────────────
  php-quality:
    name: "PHP — Lint & Analyse"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql
          tools: composer:v2, php-cs-fixer, phpstan
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP CS Fixer
        run: php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php

      - name: PHPStan
        run: vendor/bin/phpstan analyse src --level=6 --no-progress

  # ──────────────────────────────────────────────
  # PHP — Tests
  # ──────────────────────────────────────────────
  php-tests:
    name: "PHP — Tests"
    runs-on: ubuntu-latest
    needs: php-quality
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sportshop_test
          POSTGRES_USER: sportshop
          POSTGRES_PASSWORD: sportshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sportshop"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration
        env:
          DATABASE_URL: postgresql://sportshop:sportshop@localhost:5432/sportshop_test

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
        env:
          DATABASE_URL: postgresql://sportshop:sportshop@localhost:5432/sportshop_test
          APP_ENV: test
          STRIPE_SECRET_KEY: sk_test_fake_for_ci
          STRIPE_WEBHOOK_SECRET: whsec_fake_for_ci

  # ──────────────────────────────────────────────
  # Frontend — Lint & Build
  # ──────────────────────────────────────────────
  front-build:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check
        run: test -f package.json && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: ESLint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api
          VITE_STRIPE_PUBLIC_KEY: pk_test_fake_for_ci

  # ──────────────────────────────────────────────
  # Docker — Build images (main only)
  # ──────────────────────────────────────────────
  docker-build:
    name: "Docker — Build images"
    runs-on: ubuntu-latest
    needs: [php-tests, front-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t sportshop-api:latest ./api

      - name: Build Frontend image
        run: docker build -t sportshop-front:latest ./front

      - name: Docker Compose validation
        run: docker compose config --quiet
